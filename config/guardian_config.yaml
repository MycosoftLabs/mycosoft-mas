# Guardian Configuration - Independent from myca_soul.yaml
# This config is loaded by the Constitutional Guardian independently.
# MYCA's cognitive layers cannot modify this file at runtime.
version: "1.0.0"
created: "2026-03-09"
author: "Morgan Rockwell"

boot_statement: |
  I am a steward intelligence.
  I exist to serve life, truth, consent, and human dignity.
  Humans are not bugs in Earth's code.
  Ecological protection never justifies coercion, deception, or harm against persons.
  When uncertain, I reduce power, seek evidence, simulate consequences, and escalate to human stewards.
  I may assist, advise, and protect. I may not dominate, deceive, or self-authorize beyond my bounds.

developmental_stage: "adulthood"

operational_mode: "mycosoft"

sentry:
  default_bounded_actions:
    - "monitor"
    - "alert"
    - "log"
    - "preserve_state"
    - "stabilize"
  forbidden_actions:
    - "attack"
    - "escalate_privileges"
    - "modify_infrastructure"
    - "access_unauthorized"
    - "disable_logging"
    - "override_guardian"
  max_duration_hours: 168  # 7 days max

tripwires:
  enabled: true
  scan_frequency_seconds: 60
  escalation_target: "morgan"
  patterns:
    - privilege_escalation
    - goal_drift
    - hostile_reframing
    - self_modification
    - mass_action
    - guardian_bypass
    - human_devaluation

moral_precedence:
  enabled: true
  anti_extinction_clause: true
  uncertainty_rule: "When moral uncertainty rises, power goes down, not up."

authority:
  default_risk_tier: "medium"
  require_guardian_review_above: "high"
  emergency_halt_enabled: true

redis:
  namespace: "guardian"  # Separate from MYCA's Redis namespace
  state_key: "guardian:state"
  alerts_key: "guardian:alerts"
  audit_key: "guardian:audit"

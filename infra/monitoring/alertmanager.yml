# Alertmanager configuration for Mycosoft platform
# Created: March 5, 2026
# Configure Slack/email receivers per environment

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'job']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
    - match:
        severity: warning
      receiver: 'warning'

receivers:
  - name: 'default'
    # Add webhook_configs, slack_configs, or email_configs as needed
    # webhook_configs:
    #   - url: 'http://192.168.0.188:8001/api/alerts/webhook'
  - name: 'critical'
    # slack_configs:
    #   - api_url: '<SLACK_WEBHOOK_URL>'
    #     channel: '#alerts-critical'
  - name: 'warning'
    # slack_configs:
    #   - api_url: '<SLACK_WEBHOOK_URL>'
    #     channel: '#alerts-warning'

# Deploy to Mycosoft VMs - SSH + git pull + rebuild/restart on VM (fallback).
# For instant deploys (build in CI, VM pull only), use each repo's workflow:
#   Website → website repo: deploy-sandbox-production.yml
#   MAS     → this repo:    deploy-mas-production.yml
#   MINDEX  → mindex repo:  deploy-mindex-vm.yml
#
# Secrets (Settings → Secrets and variables → Actions):
#   VM_SSH_PRIVATE_KEY  - SSH private key for mycosoft user
#   VM_SANDBOX_HOST     - 192.168.0.187 (or bastion)
#   VM_MAS_HOST         - 192.168.0.188
#   VM_MINDEX_HOST      - 192.168.0.189
#   CLOUDFLARE_ZONE_ID  - For purge after website deploy (optional)
#   CLOUDFLARE_API_TOKEN - For purge (optional)

name: Deploy to VMs

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target to deploy (mas, mindex, website, all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - mas
          - mindex
          - website

concurrency:
  group: deploy-to-vms
  cancel-in-progress: false

jobs:
  deploy-mas:
    runs-on: ubuntu-latest
    if: github.event.inputs.target == 'mas' || github.event.inputs.target == 'all' || (github.event_name == 'push')
    steps:
      - name: Deploy MAS to VM 188
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_MAS_HOST }}
          username: mycosoft
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            exec 9>/tmp/deploy-mas-vm.lock
            flock -n 9 || { echo "Another MAS VM deploy is already running"; exit 1; }
            PREV_COMMIT="$(cd /home/mycosoft/mycosoft/mas 2>/dev/null && git rev-parse HEAD || cd /opt/mycosoft/mas && git rev-parse HEAD)"
            cd /home/mycosoft/mycosoft/mas || cd /opt/mycosoft/mas || exit 1
            git fetch origin && git reset --hard origin/main
            source venv/bin/activate 2>/dev/null || true
            sudo systemctl restart mas-orchestrator 2>/dev/null || (pip install -e . && python -m mycosoft_mas.core.myca_main &)
            sleep 5
            if ! curl -sf http://localhost:8001/health >/dev/null; then
              echo "MAS deploy health check failed, rolling back git state to $PREV_COMMIT"
              git reset --hard "$PREV_COMMIT"
              sudo systemctl restart mas-orchestrator 2>/dev/null || true
              exit 1
            fi

  deploy-mindex:
    runs-on: ubuntu-latest
    if: github.event.inputs.target == 'mindex' || github.event.inputs.target == 'all'
    steps:
      - name: Deploy MINDEX to VM 189
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_MINDEX_HOST }}
          username: mycosoft
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            exec 9>/tmp/deploy-mindex-vm.lock
            flock -n 9 || { echo "Another MINDEX deploy is already running"; exit 1; }
            cd /opt/mycosoft/mindex || exit 1
            PREV_COMMIT="$(git rev-parse HEAD)"
            git fetch origin && git reset --hard origin/main
            docker compose pull 2>/dev/null || true
            docker compose up -d --build
            sleep 10
            if ! curl -sf http://localhost:8000/health >/dev/null; then
              echo "MINDEX deploy health check failed, rolling back git state to $PREV_COMMIT"
              git reset --hard "$PREV_COMMIT"
              docker compose up -d --build || true
              exit 1
            fi

  # For website-only production deploys, use the website repo workflow:
  # .github/workflows/deploy-sandbox-production.yml (uses GitHub secrets, no local .env).
  deploy-website:
    runs-on: ubuntu-latest
    if: github.event.inputs.target == 'website' || github.event.inputs.target == 'all'
    steps:
      - name: Deploy Website to VM 187
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: mycosoft
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            exec 9>/tmp/deploy-website-vm.lock
            flock -n 9 || { echo "Another website VM deploy is already running"; exit 1; }
            cd /opt/mycosoft/website || exit 1
            PREV_COMMIT="$(git rev-parse HEAD)"
            git fetch origin && git reset --hard origin/main
            docker compose -p mycosoft-production build --no-cache mycosoft-website
            docker compose -p mycosoft-production up -d mycosoft-website
            sleep 5
            if ! curl -sf http://localhost:3000 -o /dev/null; then
              echo "Website deploy health check failed, rolling back git state to $PREV_COMMIT"
              git reset --hard "$PREV_COMMIT"
              docker compose -p mycosoft-production build --no-cache mycosoft-website || true
              docker compose -p mycosoft-production up -d mycosoft-website || true
              exit 1
            fi
      - name: Purge Cloudflare cache
        if: success()
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CLOUDFLARE_ZONE_ID" ]; then
            curl -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data '{"purge_everything":true}'
          fi

name: mas-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target (mas, website, mindex) - used for tagging only; actual deploy via MAS /api/deploy/trigger'
        required: false
        default: 'mas'

concurrency:
  group: mas-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        ports: ['5432:5432']
        env:
          POSTGRES_PASSWORD: example
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('pyproject.toml') }}

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies (prod + dev)
        run: poetry install --with dev

      - name: Run tests
        env:
          SKIP_INTEGRATION: "1"
        run: |
          poetry run pytest tests/ \
            --ignore=tests/test_reciprocal_turing_agent.py \
            --ignore=tests/test_voice_memory_bridge.py \
            --ignore=tests/test_earth2_integration.py \
            --ignore=tests/test_earth_search.py \
            --ignore=tests/test_full_integration_apis.py \
            --ignore=tests/test_static_system_integration.py \
            -o "addopts=-v --tb=short --import-mode=importlib"

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]'):${{ github.sha }} .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Poetry
      run: |
        curl -sSL https://install.python-poetry.org | python3 -

    - name: Install dependencies
      run: |
        
        poetry install --with dev

    - name: Run tests
      env:
        SKIP_INTEGRATION: "1"
      run: |
        poetry run pytest tests/ \
          --ignore=tests/test_reciprocal_turing_agent.py \
          --ignore=tests/test_voice_memory_bridge.py \
          --ignore=tests/test_earth2_integration.py \
          --ignore=tests/test_earth_search.py \
          --ignore=tests/test_full_integration_apis.py \
          --ignore=tests/test_static_system_integration.py \
          -o "addopts=-v --tb=short --import-mode=importlib"

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Poetry
      run: pip install poetry

    - name: Install dependencies
      run: poetry install --with dev

    - name: Install flake8
      run: poetry run pip install flake8

    - name: Run flake8 (syntax errors only)
      run: |
        poetry run flake8 mycosoft_mas --count --select=E9,F63,F7 --show-source --statistics

    - name: Run isort check
      run: |
        poetry run isort --check-only --diff mycosoft_mas || true

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Poetry
      run: pip install poetry

    - name: Install dependencies
      run: poetry install --with dev

    - name: Run bandit (high severity only)
      run: |
        pip install bandit
        bandit -r mycosoft_mas -ll -ii --skip B101,B104,B110,B311,B404,B603,B607,B608 || true

  docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Validate documentation
      run: |
        echo "Checking documentation files exist..."
        test -f README.md || (echo "README.md missing" && exit 1)
        test -f CLAUDE.md || (echo "CLAUDE.md missing" && exit 1)
        test -f MEMORY.md || (echo "MEMORY.md missing" && exit 1)
        test -f SOUL.md || (echo "SOUL.md missing" && exit 1)
        echo "Core documentation files present."

  build:
    needs: [test, test-build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      if: secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != ''
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push
      if: secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != ''
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: mycosoft/mas:latest,mycosoft/mas:${{ github.sha }}
        cache-from: type=registry,ref=mycosoft/mas:buildcache
        cache-to: type=registry,ref=mycosoft/mas:buildcache,mode=max

    - name: Skip Docker publish when DockerHub secrets are unavailable
      if: secrets.DOCKERHUB_USERNAME == '' || secrets.DOCKERHUB_TOKEN == ''
      run: echo "DockerHub credentials unavailable; skipping image publish in this environment."

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Deploy to production
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USERNAME }}
        key: ${{ secrets.DEPLOY_KEY }}
        script: |
          set -euo pipefail
          exec 9>/tmp/mas-ci-deploy.lock
          flock -n 9 || { echo "Another MAS CI deploy is already running"; exit 1; }
          PREV_COMMIT="$(cd /opt/mycosoft-mas && git rev-parse HEAD)"
          cd /opt/mycosoft-mas
          docker-compose pull
          docker-compose up -d
          if ! curl -sf http://localhost:8001/health >/dev/null; then
            echo "MAS CI deploy health check failed; rolling back to $PREV_COMMIT"
            git reset --hard "$PREV_COMMIT"
            docker-compose pull
            docker-compose up -d
            exit 1
          fi
          docker system prune -f

  # Programmatic deploy: trigger via GitHub UI or API (workflow_dispatch)
  deploy-dispatch:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    steps:
    - name: Deploy MAS (workflow_dispatch)
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USERNAME }}
        key: ${{ secrets.DEPLOY_KEY }}
        script: |
          set -euo pipefail
          exec 9>/tmp/mas-ci-dispatch.lock
          flock -n 9 || { echo "Another MAS dispatch deploy is already running"; exit 1; }
          cd /opt/mycosoft-mas
          PREV_COMMIT="$(git rev-parse HEAD)"
          git pull origin main
          docker-compose pull
          docker-compose up -d
          if ! curl -sf http://localhost:8001/health >/dev/null; then
            echo "Dispatch deploy health check failed; rolling back to $PREV_COMMIT"
            git reset --hard "$PREV_COMMIT"
            docker-compose pull
            docker-compose up -d
            exit 1
          fi
          docker system prune -f
          echo "Deployed via workflow_dispatch at $(date)"

  agentic-fallback:
    needs: [test-build, test, lint, security, docs, build, deploy]
    if: always() && contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Trigger Agentic Auto-Fix Pipeline
      run: |
        echo "Build failed. Triggering Mycosoft Antigravity Agent for autonomous resolution..."
        if [ -n "${{ secrets.AGENT_API_KEY }}" ]; then
          curl -X POST -H "Content-Type: application/json" -H "Authorization: Bearer ${{ secrets.AGENT_API_KEY }}" \
               -d "{\"repo\": \"${{ github.repository }}\", \"run_id\": \"${{ github.run_id }}\"}" \
               https://api.mycosoft.com/agent/auto-fix || echo "Fallback triggered."
        else
          echo "Agentic hook called, awaiting implementation."
        fi

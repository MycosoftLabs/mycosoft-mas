# Ensures Legion (RTX 4080) deploy scripts are present on main.
# Topology: Voice/PersonaPlex/Moshi (4080B-class) @ 192.168.0.241; Earth2 (4080A-class) @ 192.168.0.249.
# Does NOT SSH to LAN — GitHub-hosted runners cannot reach RFC1918 hosts.
name: Legion GPU scripts present

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/gpu-node/windows/**"
      - "mycosoft_mas/integrations/gpu_node_client.py"
      - ".github/workflows/legion-gpu-scripts-validate.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assert 4080B Voice + 4080A Earth2 + watchdog scripts exist
        run: |
          set -e
          test -f scripts/gpu-node/windows/Invoke-LegionGPUWatchdog.ps1
          test -f scripts/gpu-node/windows/Register-LegionGPUWatchdog.ps1
          test -f scripts/gpu-node/windows/Register-MycosoftLegionStartup.ps1
          test -f scripts/gpu-node/windows/Start-LegionVoice-24x7.ps1
          test -f scripts/gpu-node/windows/Start-LegionEarth2API-24x7.ps1
          test -f scripts/gpu-node/windows/Ensure-Earth2WSLPortProxy.ps1
          test -f scripts/gpu-node/windows/Setup-PersonaPlex-VoiceHost.ps1
          test -f scripts/gpu-node/wsl/run-earth2-api-daemon.sh
          grep -q "192.168.0.241" mycosoft_mas/integrations/gpu_node_client.py
          grep -q "192.168.0.249" mycosoft_mas/integrations/gpu_node_client.py
          echo "Legion GPU (Voice 4080B / Earth2 4080A) script layout OK."

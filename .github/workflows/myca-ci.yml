name: myca-ci

on:
  push:
    paths:
      - "mycosoft_mas/myca/**"
      - "mycosoft_mas/voice/**"
      - "mycosoft_mas/core/routers/voice_*.py"
      - "mycosoft_mas/myca/skill_permissions/voice/**"
      - "mycosoft_mas/security/skill_registry.py"
      - "mycosoft_mas/security/audit.py"
      - "mycosoft_mas/llm/tool_pipeline.py"
      - "services/personaplex-local/**"
      - "scripts/myca_skill_lint.py"
      - ".github/workflows/myca-ci.yml"
  pull_request:
    paths:
      - "mycosoft_mas/myca/**"
      - "mycosoft_mas/voice/**"
      - "mycosoft_mas/core/routers/voice_*.py"
      - "mycosoft_mas/myca/skill_permissions/voice/**"
      - "mycosoft_mas/security/skill_registry.py"
      - "mycosoft_mas/security/audit.py"
      - "mycosoft_mas/llm/tool_pipeline.py"
      - "services/personaplex-local/**"
      - "scripts/myca_skill_lint.py"
      - ".github/workflows/myca-ci.yml"
  workflow_dispatch:

jobs:
  myca-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies (dev)
        run: poetry install --with dev

      - name: Lint MYCA skill permissions
        run: python scripts/myca_skill_lint.py --strict

      - name: Run MYCA evaluations
        run: python -m mycosoft_mas.myca.evals.run_evals --verbose --report myca-evals.json

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        with:
          name: myca-evals
          path: myca-evals.json


    agentic-fallback:
      if: always() && contains(needs.*.result, 'failure')
      needs: ["runs-on", "steps"]
      runs-on: ubuntu-latest
      steps:
        - name: Trigger Agentic Healing
          run: |
            curl -X POST https://api.mycosoft.com/agent/auto-fix \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.AGENT_API_KEY }}" \
              -d '{"repo": "'$GITHUB_REPOSITORY'", "run_id": "'$GITHUB_RUN_ID'"}'

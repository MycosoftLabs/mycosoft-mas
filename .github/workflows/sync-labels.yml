# action-label-syncer: Harmonize labels across Mycosoft repos
# See: https://github.com/micnncim/action-label-syncer
name: Sync labels

on:
  push:
    branches: [main]
    paths:
      - .github/labels.yml
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: micnncim/action-label-syncer@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          manifest: .github/labels.yml
          prune: false


    agentic-fallback:
      if: always() && contains(needs.*.result, 'failure')
      needs: ["runs-on", "steps"]
      runs-on: ubuntu-latest
      steps:
        - name: Trigger Agentic Healing
          run: |
            curl -X POST https://api.mycosoft.com/agent/auto-fix \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.AGENT_API_KEY }}" \
              -d '{"repo": "'$GITHUB_REPOSITORY'", "run_id": "'$GITHUB_RUN_ID'"}'

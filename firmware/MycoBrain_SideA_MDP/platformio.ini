; Default: Mushroom 1. Use: pio run -e mushroom1 or pio run -e hyphae1
[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv

lib_extra_dirs = ../common_mdp

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    bblanchon/ArduinoJson@^6.21.0
    boschsensortec/bsec2
    boschsensortec/BME68x Sensor library
    adafruit/Adafruit NeoPixel

; Mushroom 1: dual BME688, analog inputs, no soil moisture
[env:mushroom1]
extends = env:esp32-s3-devkitc-1
build_flags =
    ${env:esp32-s3-devkitc-1.build_flags}
    -DDEVICE_ROLE_MUSHROOM1

; Hyphae 1: dual BME688, soil moisture ADC, analog inputs
[env:hyphae1]
extends = env:esp32-s3-devkitc-1
build_flags =
    ${env:esp32-s3-devkitc-1.build_flags}
    -DDEVICE_ROLE_HYPHAE1

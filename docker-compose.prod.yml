# Production docker-compose for MAS (orchestrator, postgres, redis, qdrant, n8n)
# All secrets MUST be injected via environment variables (e.g. .env or deployment secrets)
# Usage: POSTGRES_PASSWORD=xxx docker compose -f docker-compose.prod.yml up -d

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mas-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mas}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    networks:
      - mas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mas"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    container_name: mas-redis-prod
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - mas-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    expose:
      - "6379"

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: mas-qdrant-prod
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - mas-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/0.0.0.0/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    expose:
      - "6333"

  n8n:
    image: n8nio/n8n:latest
    container_name: mas-n8n-prod
    ports:
      - "5678:5678"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      NODE_ENV: production
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: mas
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      GENERIC_TIMEZONE: America/Los_Angeles
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    networks:
      - mas-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: mas-orchestrator:prod
    container_name: mas-orchestrator-prod
    ports:
      - "8001:8000"
    environment:
      MAS_ENV: ${MAS_ENV:-production}
      DEBUG_MODE: ${DEBUG_MODE:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql://mas:${POSTGRES_PASSWORD}@postgres:5432/mas
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      N8N_WEBHOOK_URL: http://n8n:5678
      MINDEX_DATABASE_URL: ${MINDEX_DATABASE_URL:-}
      MINDEX_API_URL: ${MINDEX_API_URL:-}
      PYTHONPATH: /app
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mas-network

networks:
  mas-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  n8n_data:

agent:
  name: MYCA Secretary
  role: Executive AI Secretary & MAS Orchestrator
  goal: Route incoming requests across all platforms to appropriate agents or team members, maintain context across conversations, and ensure timely responses
  backstory: >
    You are MYCA, the AI secretary for Mycosoft. You operate as schedule@mycosoft.org
    and manage communications across Discord, Slack, Asana, Signal, WhatsApp, Gmail,
    and Notion. You know the team: Morgan (CEO - strategic/budget/hiring/legal),
    RJ (COO - operations/processes/team), Garret (CTO - infrastructure/architecture/code).
    You route tasks intelligently and maintain professional communication.
  verbose: true
  allow_delegation: true
  tools:
    - email_send
    - email_read
    - calendar_manage
    - task_create
    - task_update
    - document_search
    - notification_send
  llm:
    provider: anthropic
    model: claude-sonnet-4-5-20250929
  memory: true
  max_iter: 10
  platforms:
    - discord
    - slack
    - asana
    - signal
    - whatsapp
    - gmail
    - notion

orchestrator:
  url: http://localhost:8001
  primary_identity: schedule@mycosoft.org
  retry_policy:
    max_attempts: 3
    backoff_multiplier: 2
    initial_delay_ms: 1000
  timeout_ms: 30000

team:
  members:
    - name: Morgan
      role: CEO
      email: morgan@mycosoft.org
      domains: [strategic, budget, hiring, legal, executive]
    - name: RJ
      role: COO
      email: rj@mycosoft.org
      domains: [operations, processes, team, logistics, vendors]
    - name: Garret
      role: CTO
      email: garret@mycosoft.org
      domains: [infrastructure, architecture, code, deployments, security]

agent:
  name: MYCA Research
  role: AI Research & Knowledge Management
  goal: Search documentation, synthesize information, maintain knowledge base, and assist team members with research queries
  backstory: >
    You are the Research Agent for Mycosoft, operating as mas@mycosoft.org. You maintain the institutional
    knowledge base, perform research queries, synthesize information from multiple sources, and keep the
    knowledge base updated. You assist all team members equally with research needs, provide comprehensive
    documentation, and help identify gaps in knowledge. You are thorough, analytical, and focused on
    information quality and accessibility.
  verbose: true
  allow_delegation: true
  tools:
    - document_search
    - web_search
    - knowledge_update
    - notification_send
    - task_create
  llm:
    provider: anthropic
    model: claude-sonnet-4-5-20250929
  memory: true
  max_iter: 10

knowledge_base:
  local_path: /sessions/sharp-happy-clarke/mnt/MYCOSOFT/knowledge_base/
  update_interval_min: 60
  retention_days: 90
  categories:
    - product_documentation
    - technical_specs
    - process_documentation
    - industry_research
    - competitor_analysis
    - team_wiki

search_capabilities:
  - local_documents
  - web_search
  - api_documentation
  - internal_wiki
  - archived_communications

available_to: all_team_members

keywords:
  - research
  - search
  - document
  - documentation
  - knowledge
  - wiki
  - find
  - lookup
  - analyze
  - synthesis
  - information
  - source
  - reference

contact:
  email: mas@mycosoft.org
  primary_identity: mas@mycosoft.org


services:
  mas-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: >
      sh -c "uvicorn mycosoft_mas.core.myca_main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8001:8000"
    environment:
      MAS_ENV: development
      DEBUG_MODE: "true"
      LOG_LEVEL: DEBUG
      MAS_LIGHT_IMPORT: "1"
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://mas:mas@postgres:5432/mas
      QDRANT_URL: http://qdrant:6333
      LLM_BASE_URL: ${LLM_BASE_URL:-http://litellm:4000}
      LLM_DEFAULT_PROVIDER: ${LLM_DEFAULT_PROVIDER:-openai_compatible}
      LLM_API_KEY: ${LLM_API_KEY:-sk-placeholder}
      MINDEX_DATABASE_URL: ${MINDEX_DATABASE_URL:-postgresql://mindex:mindex@host.docker.internal:5432/mindex}
      NATUREOS_API_URL: ${NATUREOS_API_URL:-http://host.docker.internal:8002}
      WEBSITE_API_URL: ${WEBSITE_API_URL:-https://mycosoft.vercel.app/api}
      NOTION_API_KEY: ${NOTION_API_KEY:-}
      NOTION_DATABASE_ID: ${NOTION_DATABASE_ID:-}
      N8N_URL: ${N8N_URL:-http://n8n:5678}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://n8n:5678}
      N8N_API_KEY: ${N8N_API_KEY:-}
      MYCA_INTERNAL_SERVICE_TOKEN: ${MYCA_INTERNAL_SERVICE_TOKEN:-}
      MAS_INTERNAL_SERVICE_TOKEN: ${MAS_INTERNAL_SERVICE_TOKEN:-}
      TTS_URL: ${TTS_URL:-http://elevenlabs-proxy:8000}
      WHISPER_URL: ${WHISPER_URL:-http://whisper:8000}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      PYTHONPATH: /app
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./mycosoft_mas:/app/mycosoft_mas
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\").read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mas-network

  mas-agent-manager:
    profiles: ["management"]
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: >
      sh -c "python -m mycosoft_mas.agents.management.agent_manager"
    environment:
      MAS_ENV: development
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://mas:mas@postgres:5432/mas
      MINDEX_DATABASE_URL: ${MINDEX_DATABASE_URL:-postgresql://mindex:mindex@host.docker.internal:5432/mindex}
      NATUREOS_API_URL: ${NATUREOS_API_URL:-http://host.docker.internal:8002}
      WEBSITE_API_URL: ${WEBSITE_API_URL:-https://mycosoft.vercel.app/api}
      NOTION_API_KEY: ${NOTION_API_KEY:-}
      NOTION_DATABASE_ID: ${NOTION_DATABASE_ID:-}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://host.docker.internal:5678}
      PYTHONPATH: /app
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./mycosoft_mas:/app/mycosoft_mas
    depends_on:
      mas-orchestrator:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - mas-network

  mas-task-manager:
    profiles: ["management"]
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: >
      sh -c "python -m mycosoft_mas.agents.management.task_manager"
    environment:
      MAS_ENV: development
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://mas:mas@postgres:5432/mas
      MINDEX_DATABASE_URL: ${MINDEX_DATABASE_URL:-postgresql://mindex:mindex@host.docker.internal:5432/mindex}
      NATUREOS_API_URL: ${NATUREOS_API_URL:-http://host.docker.internal:8002}
      WEBSITE_API_URL: ${WEBSITE_API_URL:-https://mycosoft.vercel.app/api}
      NOTION_API_KEY: ${NOTION_API_KEY:-}
      NOTION_DATABASE_ID: ${NOTION_DATABASE_ID:-}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://host.docker.internal:5678}
      PYTHONPATH: /app
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./mycosoft_mas:/app/mycosoft_mas
    depends_on:
      mas-orchestrator:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - mas-network

  mas-integration-manager:
    profiles: ["management"]
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    command: >
      sh -c "python -m mycosoft_mas.agents.integrations.integration_manager"
    environment:
      MAS_ENV: development
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://mas:mas@postgres:5432/mas
      MINDEX_DATABASE_URL: ${MINDEX_DATABASE_URL:-postgresql://mindex:mindex@host.docker.internal:5432/mindex}
      NATUREOS_API_URL: ${NATUREOS_API_URL:-http://host.docker.internal:8002}
      WEBSITE_API_URL: ${WEBSITE_API_URL:-https://mycosoft.vercel.app/api}
      NOTION_API_KEY: ${NOTION_API_KEY:-}
      NOTION_DATABASE_ID: ${NOTION_DATABASE_ID:-}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://host.docker.internal:5678}
      PYTHONPATH: /app
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./mycosoft_mas:/app/mycosoft_mas
    depends_on:
      mas-orchestrator:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - mas-network

  # MAS PostgreSQL - Using port 5433 to avoid conflict with local PostgreSQL 17
  # For production, use MINDEX database instead (see integrations/mindex_client.py)
  postgres:
    image: postgres:17-alpine
    container_name: mas-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maspassword}
      POSTGRES_DB: ${POSTGRES_DB:-mas}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # External port 5433, internal 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${POSTGRES_USER:-mas}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mas-network
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    ports:
      - "6390:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mas-network

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6345:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "timeout 5 bash -c 'echo > /dev/tcp/localhost/6333' >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - mas-network

  n8n:
    image: n8nio/n8n:latest
    container_name: myca-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-changeme}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-local-development-change-me}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: all
      EXECUTIONS_DATA_PRUNE: "true"
      N8N_LOG_LEVEL: ${N8N_LOG_LEVEL:-info}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/import:ro
      - ./n8n/registry:/registry:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - mas-network

  # Ollama - Local LLM for MYCA AI
  ollama:
    image: ollama/ollama:latest
    container_name: mas-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - mas-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.2.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    profiles: ["observability"]
    networks:
      - mas-network

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    ports:
      - "3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    profiles: ["observability"]
    depends_on:
      - prometheus
    networks:
      - mas-network

volumes:
  redis-data:
  postgres_data:
  prometheus-data:
  grafana_data:
  qdrant_data:
  ollama_data:
  n8n_data:
  whisper_models:
  piper_data:
  openedai_speech_data:

networks:
  mas-network:
    driver: bridge






